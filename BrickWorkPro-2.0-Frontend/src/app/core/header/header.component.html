<header class="bg-white shadow-md sticky top-0 z-50">
  <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
    <div class="text-2xl font-bold text-red-800">🧱 BrickWorks Pro</div>

    <div class="hidden md:flex items-center space-x-6">
      <a routerLink="/home" routerLinkActive="text-red-700 underline"
        class="text-gray-600 hover:text-red-800 font-medium">Home</a>
      <a routerLink="/products" routerLinkActive="text-red-600 underline"
        class="text-gray-600 hover:text-red-800 font-medium">Products</a>
      <a routerLink="/contact" routerLinkActive="text-red-600 underline"
        class="text-gray-600 hover:text-red-800 font-medium">Contact</a>

      <div class="flex items-center gap-4">
        @if (authService.isAuthenticated()) {
        <button (click)="onLogout()" class="text-sm font-bold text-gray-500 hover:text-red-800 transition-colors">
          Logout
        </button>
        } @else {
        <a routerLink="/login" routerLinkActive="text-red-600"
          class="text-sm font-bold text-gray-500 hover:text-red-800 transition-colors">
          Log In
        </a>
        <a routerLink="/register"
          class="bg-red-700 text-white text-sm font-bold px-4 py-2 rounded-lg hover:bg-red-800 transition-colors shadow-md hover:shadow-red-200/50">
          Register
        </a>
        }
      </div>

      <a routerLink="/get-quote" routerLinkActive="text-red-700 underline"
        class="bg-red-700 text-white px-4 py-2 rounded-lg hover:bg-red-800 transition duration-300">Get a Quote</a>
    </div>
  </nav>
</header>
