<section class="py-20 bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16">
            <h2 class="text-3xl md:text-4xl font-black text-gray-900 uppercase tracking-tight">How It's <span class="text-red-700">Made</span></h2>
            <p class="mt-4 text-lg text-gray-600 max-w-2xl mx-auto">From raw earth to structural perfection. Explore the journey of a BrickWorks Pro brick.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-5 gap-8">
            @for (item of processes; track item.step) {
                <div class="relative bg-white p-6 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg transition-shadow group">
                    <div class="absolute -top-5 left-6 w-10 h-10 bg-red-700 text-white rounded-full flex items-center justify-center font-black shadow-md group-hover:scale-110 transition-transform">
                        {{ item.step }}
                    </div>
                    <h3 class="mt-4 text-xl font-bold text-gray-900 mb-2">{{ item.title }}</h3>
                    <p class="text-sm text-gray-600 leading-relaxed">{{ item.desc }}</p>
                </div>
            }
        </div>
    </div>
</section>
