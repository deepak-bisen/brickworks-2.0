<section class="py-20 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="text-center mb-16">
            <h2 class="text-3xl md:text-4xl font-black text-gray-900 uppercase tracking-tight">Project <span class="text-red-700">Gallery</span></h2>
            <p class="mt-4 text-lg text-gray-600 max-w-2xl mx-auto">See our materials in action. Built to last generations.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            @for (img of images; track img.src) {
                <div class="group relative overflow-hidden rounded-2xl shadow-sm hover:shadow-xl transition-all h-64 cursor-pointer">
                    <img [src]="img.src" [alt]="img.alt" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-500">

                    <div class="absolute inset-0 bg-linear-to-t from-gray-900/80 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end p-6">
                        <span class="text-white font-bold text-lg">{{ img.alt }}</span>
                    </div>
                </div>
            }
        </div>
    </div>
</section>
