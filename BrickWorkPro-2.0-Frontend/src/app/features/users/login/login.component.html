<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded-lg shadow-md w-96 border-t-4 border-red-600">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Admin Login</h2>
    <form (submit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-gray-700 mb-2">Username</label>
        <input type="text" [(ngModel)]="username" name="username" 
               class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-600">
      </div>
      <div class="mb-6">
        <label class="block text-gray-700 mb-2">Password</label>
        <input type="password" [(ngModel)]="password" name="password" 
               class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-600">
      </div>
      <button type="submit" class="w-full bg-red-600 text-white py-2 rounded hover:bg-red-700 transition">
        Login
      </button>
    </form>
  </div>
</div>
