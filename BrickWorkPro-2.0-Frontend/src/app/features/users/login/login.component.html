<div class="min-h-[90vh] flex items-center justify-center p-4 bg-gray-50 page-transition">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden border-t-8 border-red-700">
    <div class="p-8">
      <header class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">BrickWorks Pro</h2>
        <p class="text-gray-500 mt-2 text-sm">Sign in to your account</p>
      </header>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <div class="space-y-1 animate-in fade-in slide-in-from-top-2 duration-300">
          <label class="text-xs font-bold text-gray-500 uppercase px-1">Username</label>
          <input type="text" formControlName="username" placeholder="Enter your username"
                 class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-red-600 focus:bg-white outline-none transition-all">
        </div>

        <div class="space-y-1 animate-in fade-in slide-in-from-top-2 duration-300" style="animation-delay: 50ms;">
          <label class="text-xs font-bold text-gray-500 uppercase px-1">Password</label>
          <input type="password" formControlName="password" placeholder="••••••••"
                 class="w-full p-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-red-600 focus:bg-white outline-none transition-all">
        </div>

        <button type="submit" [disabled]="loginForm.invalid"
                class="w-full py-4 mt-6 bg-red-700 text-white rounded-xl font-bold uppercase tracking-widest shadow-lg hover:bg-red-800 hover:shadow-red-200/50 disabled:bg-gray-300 disabled:shadow-none transition-all active:scale-[0.98]">
          Sign In
        </button>
      </form>

      <footer class="mt-8 text-center text-sm text-gray-500">
        Don't have an account?
        <a routerLink="/register" class="text-red-700 font-bold hover:underline">Register Here</a>
      </footer>
    </div>
  </div>
</div>
