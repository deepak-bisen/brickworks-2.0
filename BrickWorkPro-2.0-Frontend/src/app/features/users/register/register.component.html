<div class="min-h-screen bg-gray-100 flex items-center justify-center p-6">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden border-t-4 border-red-600">
    <div class="p-8">
      <h2 class="text-2xl font-bold text-gray-800 text-center mb-6">Create Account</h2>

      <div class="flex mb-6 bg-gray-200 rounded-lg p-1">
        <button (click)="toggleMode(false)"
                [class.bg-white]="!isEmployeeMode()"
                class="flex-1 py-2 rounded-md text-sm font-medium transition-all">Customer</button>
        <button (click)="toggleMode(true)"
                [class.bg-white]="isEmployeeMode()"
                class="flex-1 py-2 rounded-md text-sm font-medium transition-all">Employee</button>
      </div>

      <form [formGroup]="regForm" (ngSubmit)="onSubmit()" class="space-y-4">
        <input type="text" formControlName="fullName" placeholder="Full Name" class="w-full p-3 border rounded focus:ring-2 focus:ring-red-600 outline-none">
        <input type="email" formControlName="email" placeholder="Email Address" class="w-full p-3 border rounded focus:ring-2 focus:ring-red-600 outline-none">
        <input type="text" formControlName="username" placeholder="Username" class="w-full p-3 border rounded focus:ring-2 focus:ring-red-600 outline-none">
        <input type="password" formControlName="password" placeholder="Password" class="w-full p-3 border rounded focus:ring-2 focus:ring-red-600 outline-none">
        <input type="text" formControlName="phoneNumber" placeholder="Phone Number" class="w-full p-3 border rounded focus:ring-2 focus:ring-red-600 outline-none">

        @if (!isEmployeeMode()) {
          <select formControlName="customerType" class="w-full p-3 border rounded focus:ring-2 focus:ring-red-600 outline-none">
            <option value="INDIVIDUAL">Individual</option>
            <option value="CONTRACTOR">Contractor</option>
          </select>
          <textarea formControlName="address" placeholder="Delivery Address" class="w-full p-3 border rounded focus:ring-2 focus:ring-red-600 outline-none"></textarea>
        } @else {
          <input type="text" formControlName="employeeCode" placeholder="Employee ID/Code" class="w-full p-3 border rounded focus:ring-2 focus:ring-red-600 outline-none">
          <input type="text" formControlName="designation" placeholder="Designation (e.g. Driver, Sales)" class="w-full p-3 border rounded focus:ring-2 focus:ring-red-600 outline-none">
        }

        <button type="submit" [disabled]="regForm.invalid"
                class="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-700 disabled:bg-gray-400 transition-colors">
          Sign Up as {{ isEmployeeMode() ? 'Employee' : 'Customer' }}
        </button>
      </form>
    </div>
  </div>
</div>
