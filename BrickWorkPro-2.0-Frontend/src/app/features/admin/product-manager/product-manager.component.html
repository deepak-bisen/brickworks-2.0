<div class="min-h-[90vh] bg-gray-100 p-8 flex justify-center items-start">
  <div class="max-w-3xl w-full bg-white rounded-xl shadow-lg border-t-4 border-red-700">

    <header class="p-6 border-b border-gray-200 bg-gray-50">
      <h2 class="text-2xl font-bold text-gray-800">Add New Product</h2>
      <p class="text-sm text-gray-500">Upload brick details to the inventory system</p>
    </header>

    <div class="p-6">
      <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-6">

        <div class="grid grid-cols-2 gap-6">
          <div class="space-y-1">
            <label class="text-xs font-bold text-gray-600 uppercase">Product Name</label>
            <input type="text" formControlName="name" placeholder="e.g. Premium Red Clay Brick"
                   class="w-full p-3 bg-gray-50 border rounded focus:ring-2 focus:ring-red-600 outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-gray-600 uppercase">Image Upload</label>
            <input type="file" (change)="onFileSelected($event)" accept="image/png, image/jpeg"
                   class="w-full p-2.5 bg-gray-50 border rounded text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100">
          </div>
        </div>

        <div class="grid grid-cols-3 gap-4">
          <div class="space-y-1">
            <label class="text-xs font-bold text-gray-600 uppercase">Category</label>
            <input type="text" formControlName="category" placeholder="Construction"
                   class="w-full p-3 bg-gray-50 border rounded focus:ring-2 focus:ring-red-600 outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-gray-600 uppercase">Brick Type</label>
            <input type="text" formControlName="brickType" placeholder="CLAY"
                   class="w-full p-3 bg-gray-50 border rounded focus:ring-2 focus:ring-red-600 outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-gray-600 uppercase">Dimensions</label>
            <input type="text" formControlName="dimensions" placeholder="9 x 4.5 x 3 inches"
                   class="w-full p-3 bg-gray-50 border rounded focus:ring-2 focus:ring-red-600 outline-none">
          </div>
        </div>

        <div class="space-y-1">
          <label class="text-xs font-bold text-gray-600 uppercase">Description</label>
          <textarea formControlName="description" rows="2" placeholder="Material composition and usage details..."
                    class="w-full p-3 bg-gray-50 border rounded focus:ring-2 focus:ring-red-600 outline-none"></textarea>
        </div>

        <div class="grid grid-cols-4 gap-4">
          <div class="space-y-1">
            <label class="text-xs font-bold text-gray-600 uppercase">Unit Price (₹)</label>
            <input type="number" formControlName="unitPrice"
                   class="w-full p-3 bg-gray-50 border rounded focus:ring-2 focus:ring-red-600 outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-gray-600 uppercase">Est. Cost (₹)</label>
            <input type="number" formControlName="estimatedCost"
                   class="w-full p-3 bg-gray-50 border rounded focus:ring-2 focus:ring-red-600 outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-gray-600 uppercase">Stock Qty</label>
            <input type="number" formControlName="stockQuantity"
                   class="w-full p-3 bg-gray-50 border rounded focus:ring-2 focus:ring-red-600 outline-none">
          </div>
          <div class="space-y-1">
            <label class="text-xs font-bold text-gray-600 uppercase">Bulk Threshold</label>
            <input type="number" formControlName="bulkDiscountThreshold" placeholder="Min. for discount"
                   class="w-full p-3 bg-gray-50 border rounded focus:ring-2 focus:ring-red-600 outline-none">
          </div>
        </div>

        <button type="submit" [disabled]="productForm.invalid || !selectedFile()"
                class="w-full py-4 mt-4 bg-red-700 text-white rounded font-bold shadow-lg hover:bg-red-800 disabled:bg-gray-300 transition-colors uppercase tracking-widest">
          Publish Product to Catalog
        </button>
      </form>
    </div>

  </div>
</div>
