<div class="max-w-2xl mx-auto p-4 md:p-8">
  <div class="mb-6">
    <a routerLink="/customer/dashboard" class="text-sm font-bold text-gray-500 hover:text-gray-900">← Back to Dashboard</a>
    <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900 mt-3">Profile Settings</h1>
    <p class="text-gray-500 mt-1 text-sm">Update your contact details and billing address.</p>
  </div>

  @if (isLoading()) {
    <div class="bg-white rounded-2xl border border-gray-100 p-6 md:p-8 space-y-5">
      @for (field of [1,2,3,4]; track field) {
        <div class="space-y-2">
          <app-skeleton-block height="sm" width="25%" />
          <app-skeleton-block height="xl" />
        </div>
      }
      <div class="pt-4 flex justify-center">
        <app-loading-spinner label="Loading your profile..." />
      </div>
    </div>
  } @else if (loadError()) {
    <div class="bg-white rounded-2xl border border-gray-100 p-8 md:p-10 text-center shadow-sm">
      <div class="text-4xl mb-4">⚠️</div>
      <p class="text-gray-700 font-bold">{{ loadError() }}</p>
      <a routerLink="/customer/dashboard" class="inline-block mt-6 bg-red-700 text-white font-bold px-6 py-3 rounded-xl hover:bg-red-800">
        Back to Dashboard
      </a>
    </div>
  } @else {
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 md:p-8 space-y-5">
      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Full Name</label>
        <input type="text" formControlName="fullName"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none" />
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Email</label>
        <input type="email" formControlName="email"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-gray-500 cursor-not-allowed" />
        <p class="text-xs text-gray-400 mt-1">Email cannot be changed here.</p>
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Phone (10 digits)</label>
        <input type="text" formControlName="phone" maxlength="10" inputmode="numeric"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none" />
      </div>

      <div>
        <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Billing Address</label>
        <textarea formControlName="address" rows="3"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none resize-y"></textarea>
      </div>

      <button type="submit" [disabled]="profileForm.invalid || isSaving()"
        class="w-full bg-red-700 text-white font-bold py-3.5 rounded-xl hover:bg-red-800 disabled:opacity-50 transition-colors uppercase tracking-wider text-sm flex items-center justify-center gap-3">
        @if (isSaving()) {
          <app-loading-spinner size="sm" [centered]="false" />
          <span>Saving changes...</span>
        } @else {
          Save Changes
        }
      </button>
    </form>
  }
</div>
