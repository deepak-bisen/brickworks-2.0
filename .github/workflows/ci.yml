name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BrickWorkPro-2.0-Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build backend
        run: mvn -B -q package -DskipTests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BrickWorkPro-2.0-Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: BrickWorkPro-2.0-Frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Run unit tests
        run: npm test -- --run src/app/core/services/auth.service.spec.ts src/app/features/orders/services/cart.service.spec.ts