spring.application.name=service-registry-brickwork

# Set the port for the Eureka server. 8761 is the conventional default.
server.port=8761

# --- Eureka Server Configuration ---
# A standalone Eureka server does not need to register with itself.
eureka.client.register-with-eureka=false

# A standalone Eureka server does not need to fetch a copy of the registry from itself.
eureka.client.fetch-registry=false

logging.level.root=INFO
logging.level.com.brickwork=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{40} - %msg%n
