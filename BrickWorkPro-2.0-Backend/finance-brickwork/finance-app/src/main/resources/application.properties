spring.application.name=finance-brickwork

# It tells Spring Boot to find and use any random available port, preventing port conflicts.
server.port=8084

#Databse Configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/brickworks2finance?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT Secret (Must match the common-security one!)
jwt.secret=${JWT_SECRET:change-me}
internal.service.key=${INTERNAL_SERVICE_KEY:brickworks-internal-dev-key}
spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.client.config.default.connectTimeout=10000
spring.cloud.openfeign.client.config.default.readTimeout=30000
resilience4j.timelimiter.configs.default.timeoutDuration=30s
logging.level.root=INFO
logging.level.com.brickwork=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{40} - %msg%n

# Service registry (local dev: pin to localhost so Feign/gateway reach the right instance)
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=true

# --- Razorpay Configuration ---
# Replace these with your actual test keys later
razorpay.key.id=${RAZORPAY_KEY_ID:change-me}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:change-me}
razorpay.webhook.secret=${RAZORPAY_WEBHOOK_SECRET:change-me}

