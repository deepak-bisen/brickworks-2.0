spring.application.name=api-gateway
server.port=9191


# Eureka Configuration
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

#Spring MVC found on classpath, which is incompatible with Spring Cloud Gateway. Action: Removing
spring.main.web-application-type=reactive

# GATEWAY ROUTES
# Route for Users Service
spring.cloud.gateway.routes[0].id=users-service
spring.cloud.gateway.routes[0].uri=lb://USERS-BRICKWORK
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**, /api/users/**

# Route for Products Service
spring.cloud.gateway.routes[1].id=products-service
spring.cloud.gateway.routes[1].uri=lb://PRODUCTS-BRICKWORK
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**, /api/production-logs/**, /api/raw-materials/**

# Route for Orders Service
spring.cloud.gateway.routes[2].id=orders-service
spring.cloud.gateway.routes[2].uri=lb://ORDERS-BRICKWORK
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/orders/**

# Route for Finance Service
spring.cloud.gateway.routes[3].id=finance-service
spring.cloud.gateway.routes[3].uri=lb://FINANCE-BRICKWORK
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/finance/**

# Enable Gateway to discover services via Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ===================================================================
# GLOBAL CORS CONFIGURATION
# ===================================================================
# Intercepts OPTIONS requests globally and approves them for the frontend
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET, POST, PUT, PATCH, DELETE, OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

# Allow large image files up to 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB

# Service registry (local dev: pin to localhost so Feign/gateway reach the right instance)
eureka.instance.hostname=localhost
eureka.instance.ip-address=127.0.0.1
eureka.instance.prefer-ip-address=true

logging.level.root=INFO
logging.level.com.brickwork=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{40} - %msg%n