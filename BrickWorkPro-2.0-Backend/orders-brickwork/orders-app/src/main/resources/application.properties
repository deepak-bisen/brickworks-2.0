spring.application.name=orders-brickwork

# It tells Spring Boot to find and use any random available port, preventing port conflicts.
server.port=8080

#Databse Configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/brickworks2orders?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

#JPA & HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

jwt.secret=${JWT_SECRET:change-me}
internal.service.key=${INTERNAL_SERVICE_KEY:change-me}
spring.cloud.openfeign.circuitbreaker.enabled=true
logging.level.root=INFO
logging.level.com.brickwork=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{40} - %msg%n

# Force Eureka to register using the IP address instead of the Windows hostname
eureka.instance.prefer-ip-address=true

# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:change-me}
spring.mail.password=${MAIL_PASSWORD:change-me}

# WhatsApp / UltraMsg
whatsapp.instance.id=${WHATSAPP_INSTANCE_ID:change-me}
whatsapp.token=${WHATSAPP_TOKEN:change-me}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true