spring.application.name=products-brickwork

# It tells Spring Boot to find and use any random available port, preventing port conflicts.
server.port=8081

#Databse Configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/brickworks2products?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
jwt.secret=${JWT_SECRET:change-me}
internal.service.key=${INTERNAL_SERVICE_KEY:change-me}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

#JPA & HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.org.springframework.security=TRACE

# Allow large image files up to 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-http-form-post-size=10MB

# Force Eureka to register using the IP address instead of the Windows hostname
eureka.instance.prefer-ip-address=true