spring.application.name=users-brickwork

# It tells Spring Boot to find and use any random available port, preventing port conflicts.
server.port=8083

#Databse Configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/brickworks2users?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

#JPA & HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.org.springframework.security=TRACE

# A very strong, base64-encoded secret key (At least 256 bits!)
# In production, NEVER put this in the code; use environment variables.
jwt.secret=5f4dcc3b5aa765d61d8327deb882cf99b8e14ab75f4dcc3b5aa765d61d8327de
jwt.expiration=86400000
# Expiration = 24 hours in milliseconds