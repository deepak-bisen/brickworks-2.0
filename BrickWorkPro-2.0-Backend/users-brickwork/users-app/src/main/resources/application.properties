spring.application.name=users-brickwork

# It tells Spring Boot to find and use any random available port, preventing port conflicts.
server.port=8083

#Databse Configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/brickworks2users?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

#JPA & HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.level.root=INFO
logging.level.com.brickwork=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{40} - %msg%n

# A strong secret key for signing JWTs. It may be provided as base64 or raw text.
# In production, NEVER put this in code; use environment variables instead.
jwt.secret=${JWT_SECRET:change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}
internal.service.key=${INTERNAL_SERVICE_KEY:change-me}
# Expiration = 24 hours in milliseconds

# Force Eureka to register using the IP address instead of the Windows hostname
eureka.instance.prefer-ip-address=true