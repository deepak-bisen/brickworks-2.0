spring.application.name=orders-brickwork

# It tells Spring Boot to find and use any random available port, preventing port conflicts.
server.port=8081

#Databse Configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/brickworks2orders?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

#JPA & HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
