spring.application.name=finance-brickwork

# It tells Spring Boot to find and use any random available port, preventing port conflicts.
server.port=8084

#Databse Configuration
spring.datasource.url=jdbc:mariadb://localhost:3306/brickworks2finance?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

#JPA & HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.org.springframework.security=TRACE

