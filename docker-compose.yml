services:
  mariadb:
    image: mariadb:11
    container_name: brickwork-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MARIADB_USER: ${DB_USERNAME:-root}
      MARIADB_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mariadb_data: